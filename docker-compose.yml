services:
  keycloak:
    image: us-central1-docker.pkg.dev/kambista-tech-production/keycloak/keycloak-custom:latest
    container_name: keycloak
    restart: always
    env_file:
      - .env
    command: start
    expose:
      - "8080"
    networks:
      - keycloak_net

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-keycloak
    restart: always
    depends_on:
      - keycloak
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/keycloak.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - keycloak_net

networks:
  keycloak_net: